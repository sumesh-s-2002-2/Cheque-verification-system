global:
  enabled: true
  seed: 42
  num_augmented_per_sample: 5      
  save_dir: "src/data/synthetic"

geometric:
  rotation:
    enabled: true
    max_angle_deg: 8.0
    fill_mode: "constant"
    fill_value: 255
  scaling:
    enabled: true
    scale_range: [0.85, 1.15]
  shear:
    enabled: true
    shear_range_deg: [-5.0, 5.0]
  translation:
    enabled: true
    max_shift_ratio: 0.05          
  horizontal_flip:
    enabled: false             
  elastic_distortion:
    enabled: true
    alpha: 34
    sigma: 4

ink_simulation:
  pressure_variation:
    enabled: true
    min_alpha: 0.6
    max_alpha: 1.0
  ink_fading:
    enabled: true
    fade_ratio: 0.2                
    min_intensity: 180
  ink_bleed:
    enabled: true
    kernel_size: 3
    iterations: 1
  stroke_thinning:
    enabled: true
    erosion_kernel_size: 2

acquisition_noise:
  gaussian_noise:
    enabled: true
    mean: 0
    std_range: [2, 12]
  motion_blur:
    enabled: true
    kernel_size_range: [3, 7]
    angle_range: [-45, 45]
  jpeg_compression:
    enabled: true
    quality_range: [50, 90]
  shadow_overlay:
    enabled: true
    max_shadow_intensity: 60       
    shadow_ratio: 0.3              
  brightness_jitter:
    enabled: true
    factor_range: [0.8, 1.2]

fault_injection:
  partial_signature:
    enabled: true
    crop_ratio_range: [0.1, 0.35]  
    crop_side: "random"            
  overlapping_text:
    enabled: true
    font_scale_range: [0.4, 0.8]
    opacity_range: [0.2, 0.6]
    num_words_range: [1, 3]
  random_crop:
    enabled: true
    min_crop_ratio: 0.7
  stain_artifacts:
    enabled: true
    num_stains_range: [1, 4]
    stain_radius_range: [5, 20]
    stain_intensity_range: [100, 200]
